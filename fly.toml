app = "transit-tracker-api"
primary_region = "sjc"
swap_size_mb = 512

kill_timeout = "1m"

[build.args]
  BUILD_FOR_FLY = "true"

[deploy]
  strategy = "rolling"
  release_command = '"pnpm sentry:sourcemaps ; pnpm gtfs:db:migrate"'

[env]
  NODE_OPTIONS = "--max-old-space-size=768"
  GTFS_RT_MIN_CACHE_AGE = "30s"
  LOG_COMPACT = "true"

  # Connection shedding
  SHED_ENABLED = "true"
  SHED_CPU_HIGH_WATER = "0.0575"  # approaching Fly.io baseline for shared cpu
  SHED_SHARE_MARGIN = "0.1"
  SHED_COOLDOWN = "30s"
  SHED_BATCH_SIZE = "25"

[http_service]
  internal_port = 3000
  force_https = true
  
  # Disable Fly proxy's autoscaling so the separate autoscaler can manage the machines
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 90

  [[http_service.checks]]
    grace_period = "5s"
    interval = "1m"
    method = "GET"
    timeout = "10s"
    path = "/healthz"

[metrics]
  port = 9090
  path = "/metrics"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
